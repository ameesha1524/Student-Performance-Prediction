{% extends "base.html" %}

{% block title %}New Prediction - EduPredict{% endblock %}

{% block extra_css %}
<style>
    /* Integrated EduPredict Dark Theme */
    .section {
        position: relative;
        min-height: 80vh;
    }

    .section .section-center {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        -webkit-transform: translateY(-50%);
        transform: translateY(-50%);
    }

    .prediction-form {
        position: relative;
        max-width: 642px;
        width: 100%;
        margin: auto;
        padding: 40px;
        overflow: hidden;
        /* Replaced the hotel image with a sleek dark gradient to match your panels */
        background: linear-gradient(135deg, #1f2937, #111827); 
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        border: 1px solid #374151;
        z-index: 20;
    }

    .prediction-form .form-header {
        text-align: center;
        position: relative;
        margin-bottom: 30px;
    }

    .prediction-form .form-header h1 {
        font-weight: 700;
        font-size: 36px;
        margin: 0px;
        color: #fff;
    }

    .prediction-form .form-group {
        position: relative;
        margin-bottom: 30px;
    }

    .prediction-form .form-control {
        background-color: rgba(255, 255, 255, 0.05);
        height: 60px;
        padding: 0px 25px;
        border: 1px solid #374151;
        border-radius: 8px;
        color: #fff;
        -webkit-transition: 0.2s;
        transition: 0.2s;
    }

    .prediction-form .form-control::-webkit-input-placeholder { color: rgba(255, 255, 255, 0.4); }
    .prediction-form .form-control:-ms-input-placeholder { color: rgba(255, 255, 255, 0.4); }
    .prediction-form .form-control::placeholder { color: rgba(255, 255, 255, 0.4); }

    .prediction-form .form-control:focus {
        background-color: rgba(255, 255, 255, 0.1);
        border-color: #0d6efd; /* Bootstrap Primary Blue instead of Orange */
        box-shadow: 0px 0px 0px 2px rgba(13, 110, 253, 0.3);
        outline: none;
    }

    .prediction-form .form-label {
        position: absolute;
        top: -10px;
        left: 20px;
        background: #1f2937; /* Match form background */
        padding: 0 10px;
        color: #607ea9; /* Blue accent */
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.3px;
        height: 20px;
        line-height: 20px;
        border-radius: 4px;
    }

    .prediction-form .submit-btn {
        color: #fff;
        background-color: #0f5ccf; /* Primary Blue */
        font-weight: 700;
        height: 60px;
        padding: 10px 30px;
        width: 100%;
        border-radius: 8px;
        border: none;
        text-transform: uppercase;
        font-size: 16px;
        letter-spacing: 1.3px;
        -webkit-transition: 0.2s all;
        transition: 0.2s all;
    }

    .prediction-form .submit-btn:hover,
    .prediction-form .submit-btn:focus {
        background-color: #0b5ed7;
        box-shadow: 0 4px 15px rgba(13, 110, 253, 0.4);
    }
</style>
{% endblock %}

{% block content %}
<div id="prediction" class="section">
    <div class="section-center">
        <div class="container">
            <div class="row">
                <div class="prediction-form">
                    <div class="form-header">
                        <p class="text-secondary mt-2">Enter student metrics to generate a performance analysis.</p>
                    </div>
                    
                    <form action="/predict" method="POST">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <span class="form-label">Attendance (%)</span>
                                    <input class="form-control" type="number" step="0.1" name="attendance" placeholder="e.g. 85.5" required>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="form-group">
                                    <span class="form-label">Internal Marks</span>
                                    <input class="form-control" type="number" step="0.1" name="internal" placeholder="e.g. 42" required>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <span class="form-label">Assignment Score</span>
                                    <input class="form-control" type="number" step="0.1" name="assignment" placeholder="e.g. 18" required>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="form-group">
                                    <span class="form-label">Quiz Score</span>
                                    <input class="form-control" type="number" step="0.1" name="quiz" placeholder="e.g. 15" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-btn mt-3">
                            <button type="submit" class="submit-btn">Generate Prediction</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
